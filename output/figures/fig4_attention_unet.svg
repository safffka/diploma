<text x="114" y="357" text-anchor="middle" font-size="8" fill="#444">512ch · 32×32</text>

<!-- ═══ BOTTLENECK + MHSA ═══ -->

<path d="M114,373 V390 H158" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

<rect x="160" y="398" width="360" height="62" rx="6" fill="#ECEAF5" stroke="#534AB7" stroke-width="1.5"/>
