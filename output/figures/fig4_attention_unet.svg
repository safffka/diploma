<text x="566" y="188" text-anchor="middle" font-size="8" fill="#444">128ch · 128×128</text>

<line x1="566" y1="145" x2="566" y2="126" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<rect x="467" y="62" width="198" height="62" rx="6" fill="#F8E5DD" stroke="#D85A30" stroke-width="1.5"/>
