<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 515" font-family="'Segoe UI',Arial,sans-serif">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#555"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#1D9E75"/></marker>
</defs>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Attention U-Net (scratch)</text>
<text x="340" y="39" text-anchor="middle" font-size="12" fill="#666">37.8M параметров · 302.8 GFLOPs · mIoU 54.4% · BIoU 32.2%</text>

