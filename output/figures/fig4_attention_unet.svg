<text x="114" y="94" text-anchor="middle" font-size="8" fill="#444">ResBlock×2</text>
<text x="114" y="108" text-anchor="middle" font-size="8" fill="#444">64ch · 256×256</text>

<line x1="114" y1="124" x2="114" y2="143" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

