<text x="340" y="430" text-anchor="middle" font-size="8" fill="#444">ConvBNReLU → MHSA(8 голов) → ConvBNReLU</text>
<text x="340" y="444" text-anchor="middle" font-size="8" fill="#444">1024ch · 16×16</text>

<!-- MHSA amber badge inside bottleneck -->
<rect x="272" y="418" width="136" height="16" rx="3" fill="#FDF2DB" stroke="#EF9F27" stroke-width="1"/>
<text x="340" y="429" text-anchor="middle" font-size="7" font-weight="bold" fill="#333">MHSA · 8 голов</text>

<!-- MHSA detail box (amber) -->
<rect x="220" y="468" width="240" height="24" rx="4" fill="#FDF2DB" stroke="#EF9F27" stroke-width="1"/>
<text x="340" y="484" text-anchor="middle" font-size="8" fill="#333">MultiHeadSelfAttention · 32×32 = 1024 токена</text>

<path d="M520,398 H566 V375" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

