<text x="114" y="274" text-anchor="middle" font-size="8" fill="#444">256ch · 64×64</text>

<line x1="114" y1="290" x2="114" y2="309" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<rect x="15" y="311" width="198" height="62" rx="6" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
