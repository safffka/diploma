<text x="566" y="174" text-anchor="middle" font-size="7.5" fill="#444">ConvTranspose + concat + Conv×2</text>
<text x="566" y="188" text-anchor="middle" font-size="8" fill="#444">128ch · 128×128</text>

<!-- ↑ Dec2→Dec1 -->
<line x1="566" y1="145" x2="566" y2="126" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Dec1 -->
<rect x="467" y="62" width="198" height="62" rx="6" fill="#F8E5DD" stroke="#D85A30" stroke-width="1.5"/>
<text x="566" y="78" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">DecoderBlock 1</text>
<text x="566" y="91" text-anchor="middle" font-size="7.5" fill="#444">ConvTranspose + concat + Conv×2</text>
<text x="566" y="105" text-anchor="middle" font-size="8" fill="#444">64ch · 256×256</text>

<!-- Head + Output -->
<path d="M566,62 V50 H537 V48" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

<rect x="485" y="16" width="90" height="30" rx="5" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
<text x="530" y="35" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">Conv 1×1 → 6</text>

<line x1="575" y1="31" x2="588" y2="31" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<rect x="590" y="16" width="82" height="30" rx="5" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
<text x="631" y="35" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">6×512×512</text>

