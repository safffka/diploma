<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 478" font-family="'Segoe UI',Arial,sans-serif">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#555"/></marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10z" fill="#1D9E75"/></marker>
</defs>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">U-Net (ResNet50-style encoder)</text>
<text x="340" y="39" text-anchor="middle" font-size="12" fill="#666">37.5M параметров · 298.4 GFLOPs · mIoU 55.8%</text>

<!-- ═══ ENCODER (left column) ═══ -->

<!-- Enc1 -->
<rect x="15" y="62" width="198" height="62" rx="6" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
<text x="114" y="80" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">EncoderBlock 1</text>
<text x="114" y="94" text-anchor="middle" font-size="8" fill="#444">ResBlock×2</text>
<text x="114" y="108" text-anchor="middle" font-size="8" fill="#444">64ch · 256×256</text>

<!-- ↓ -->
<line x1="114" y1="124" x2="114" y2="143" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

