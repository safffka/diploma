<text x="566" y="257" text-anchor="middle" font-size="7.5" fill="#444">ConvTranspose + concat + Conv×2</text>
<text x="566" y="271" text-anchor="middle" font-size="8" fill="#444">256ch · 64×64</text>

<!-- ↑ Dec3→Dec2 -->
<line x1="566" y1="228" x2="566" y2="209" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Dec2 -->
<rect x="467" y="145" width="198" height="62" rx="6" fill="#F8E5DD" stroke="#D85A30" stroke-width="1.5"/>
