<text x="114" y="177" text-anchor="middle" font-size="8" fill="#444">ResBlock×2</text>
<text x="114" y="191" text-anchor="middle" font-size="8" fill="#444">128ch · 128×128</text>

<!-- ↓ -->
<line x1="114" y1="207" x2="114" y2="226" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Enc3 -->
<rect x="15" y="228" width="198" height="62" rx="6" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
<text x="114" y="246" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">EncoderBlock 3</text>
<text x="114" y="260" text-anchor="middle" font-size="8" fill="#444">ResBlock×2</text>
<text x="114" y="274" text-anchor="middle" font-size="8" fill="#444">256ch · 64×64</text>

<!-- ↓ -->
<line x1="114" y1="290" x2="114" y2="309" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

<!-- Enc4 -->
<rect x="15" y="311" width="198" height="62" rx="6" fill="#DFF0EA" stroke="#1D9E75" stroke-width="1.5"/>
<text x="114" y="329" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">EncoderBlock 4</text>
<text x="114" y="343" text-anchor="middle" font-size="8" fill="#444">ResBlock×2</text>
<text x="114" y="357" text-anchor="middle" font-size="8" fill="#444">512ch · 32×32</text>

<!-- ═══ BOTTLENECK (center) ═══ -->

<!-- Enc4 → Bottleneck path -->
<path d="M114,373 V390 H193" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

<rect x="195" y="400" width="290" height="58" rx="6" fill="#ECEAF5" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Bottleneck</text>
<text x="340" y="434" text-anchor="middle" font-size="8" fill="#444">ConvBNReLU×2</text>
<text x="340" y="448" text-anchor="middle" font-size="8" fill="#444">1024ch · 16×16</text>

<!-- Bottleneck → Dec4 path -->
<path d="M485,400 H566 V375" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#ah)"/>

<!-- ═══ DECODER (right column) ═══ -->

<!-- Dec4 -->
<rect x="467" y="311" width="198" height="62" rx="6" fill="#F8E5DD" stroke="#D85A30" stroke-width="1.5"/>
<text x="566" y="327" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">DecoderBlock 4</text>
<text x="566" y="340" text-anchor="middle" font-size="7.5" fill="#444">ConvTranspose + concat + Conv×2</text>
<text x="566" y="354" text-anchor="middle" font-size="8" fill="#444">512ch · 32×32</text>

<!-- ↑ Dec4→Dec3 -->
<line x1="566" y1="311" x2="566" y2="292" stroke="#555" stroke-width="1.2" marker-end="url(#ah)"/>

